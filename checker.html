<!DOCTYPE html>
<html>
<head>
<title>Checker</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>Plagiarism Checker</h2>

<form method="POST" enctype="multipart/form-data">

<textarea name="text1" placeholder="Enter Text 1"></textarea>
<textarea name="text2" placeholder="Enter Text 2"></textarea>

<h3>Upload Files</h3>
<input type="file" name="file1">
<input type="file" name="file2">

<h3>Remove Plagiarism</h3>
<textarea name="rewrite" placeholder="Rewrite text here"></textarea>

<br>
<button class="green">Check Similarity</button>
<button type="reset" class="red">Delete</button>

</form>

</div>

</body>
</html>
